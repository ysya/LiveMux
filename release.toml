shared-version = true
tag-name = "v{{version}}"
tag-message = "v{{version}}"
pre-release-commit-message = "chore: release v{{version}}"
publish = false
release = true
push = true
tag = true

# Also update the version in tauri.conf.json
[[pre-release-replacements]]
file = "src-tauri/tauri.conf.json"
search = '"version": ".*"'
replace = '"version": "{{version}}"'
exactly = 1
