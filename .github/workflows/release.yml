name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: ui/pnpm-lock.yaml

      - name: Install and build frontend
        working-directory: ui
        run: |
          pnpm install
          pnpm build

      - name: Upload frontend dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: ui/dist

  build-tauri:
    needs: build-frontend
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
            rust_target: aarch64-apple-darwin
          - platform: windows-latest
            args: ""
            rust_target: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: ui/dist

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      # Windows: download ExifTool standalone exe and swap bundle resources
      - name: Setup ExifTool (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $url = "https://exiftool.org/exiftool-13.52_64.zip"
          Invoke-WebRequest -Uri $url -OutFile exiftool.zip
          Expand-Archive -Path exiftool.zip -DestinationPath exiftool-tmp
          # Find the exe (may be named exiftool(-k).exe or exiftool.exe)
          $exe = Get-ChildItem -Path exiftool-tmp -Filter '*.exe' -Recurse | Select-Object -First 1
          if (-not $exe) { throw "ExifTool exe not found in zip" }
          New-Item -ItemType Directory -Force -Path src-tauri/resources/exiftool-win
          Copy-Item $exe.FullName src-tauri/resources/exiftool-win/exiftool.exe
          # Verify the file exists
          if (-not (Test-Path src-tauri/resources/exiftool-win/exiftool.exe)) {
            throw "exiftool.exe was not placed correctly"
          }
          Write-Host "ExifTool exe placed at: src-tauri/resources/exiftool-win/exiftool.exe"
          # Replace bundle resources to point to Windows exe
          $conf = Get-Content src-tauri/tauri.conf.json -Raw | ConvertFrom-Json
          $conf.bundle.resources = @{ "resources/exiftool-win/exiftool.exe" = "resources/exiftool-win/exiftool.exe" }
          $conf | ConvertTo-Json -Depth 10 | Set-Content src-tauri/tauri.conf.json
          Write-Host "Updated tauri.conf.json bundle resources"

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: LiveMux v__VERSION__
          releaseBody: See the assets below to download the installer for your platform.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }} --config '{"build":{"beforeBuildCommand":""}}'
          projectPath: src-tauri
