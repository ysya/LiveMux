name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
            rust_target: aarch64-apple-darwin
          - platform: macos-latest
            args: "--target x86_64-apple-darwin"
            rust_target: x86_64-apple-darwin
          - platform: windows-latest
            args: ""
            rust_target: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: ui/pnpm-lock.yaml

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: pnpm install
        working-directory: ui

      # Windows: download ExifTool standalone exe and swap bundle resources
      - name: Setup ExifTool (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $url = "https://exiftool.org/exiftool-13.52_64.zip"
          Invoke-WebRequest -Uri $url -OutFile exiftool.zip
          Expand-Archive -Path exiftool.zip -DestinationPath exiftool-tmp
          New-Item -ItemType Directory -Force -Path src-tauri/resources/exiftool-win
          Move-Item exiftool-tmp/exiftool*.exe src-tauri/resources/exiftool-win/exiftool.exe
          # Replace bundle resources to point to Windows exe instead of Perl scripts
          $conf = Get-Content src-tauri/tauri.conf.json -Raw | ConvertFrom-Json
          $conf.bundle.resources = @{ "resources/exiftool-win/exiftool.exe" = "resources/exiftool-win/exiftool.exe" }
          $conf | ConvertTo-Json -Depth 10 | Set-Content src-tauri/tauri.conf.json

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: LiveMux v__VERSION__
          releaseBody: See the assets below to download the installer for your platform.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
          projectPath: src-tauri
